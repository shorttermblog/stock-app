<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Stock App</title>

  <script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 32px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 120px;
      gap: 10px;
      margin-bottom: 25px;
    }

    input,
    button {
      width: 100%;
      padding: 13px 14px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
    }

    input {
      background: #1e293b;
      color: white;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 25px;
    }

    .card {
      background: #1e293b;
      padding: 18px;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
    }

    .label {
      color: #94a3b8;
      font-size: 13px;
    }

    .value {
      font-size: 24px;
      font-weight: bold;
      margin-top: 8px;
      word-break: break-word;
    }

    .positive {
      color: #22c55e;
    }

    .negative {
      color: #ef4444;
    }

    .chart-toggle {
      margin-bottom: 10px;
      display: flex;
      justify-content: flex-end;
    }

    .chart-toggle label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
    }

    .chart-toggle input {
      width: auto;
    }

    .chart-box {
      background: #ffffff;
      padding: 12px;
      border-radius: 16px;
      height: 520px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
      margin-bottom: 30px;
      overflow: hidden;
    }

    #chart {
      width: 100%;
      height: 100%;
    }

    .news {
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
    }

    .news h3 {
      margin-top: 0;
    }

    .news ul {
      padding-left: 20px;
    }

    .news li {
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .news a {
      color: #93c5fd;
      text-decoration: none;
    }

    @media (max-width: 768px) {
      .container {
        margin: 0;
        padding: 16px;
      }

      h1 {
        font-size: 26px;
        margin-bottom: 18px;
      }

      .controls {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      input,
      button {
        font-size: 16px;
        padding: 14px;
      }

      .cards {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .card {
        padding: 16px;
      }

      .value {
        font-size: 22px;
      }

      .chart-toggle {
        justify-content: flex-start;
        margin-bottom: 12px;
      }

      .chart-box {
        height: 380px;
        padding: 8px;
        border-radius: 14px;
      }

      .news {
        padding: 16px;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 12px;
      }

      h1 {
        font-size: 24px;
      }

      .chart-box {
        height: 340px;
      }

      .value {
        font-size: 20px;
      }

      .news ul {
        padding-left: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Stock Dashboard</h1>

    <div class="controls">
      <input id="ticker" value="AAPL" placeholder="Ticker">
      <input id="start" type="date">
      <input id="end" type="date">
      <button onclick="load()">Load</button>
    </div>

    <div class="cards">
      <div class="card">
        <div class="label">Ticker</div>
        <div class="value" id="tickerCard">-</div>
      </div>

      <div class="card">
        <div class="label">Last Price</div>
        <div class="value" id="priceCard">-</div>
      </div>

      <div class="card">
        <div class="label">Daily Change</div>
        <div class="value" id="changeCard">-</div>
      </div>
    </div>

    <div class="chart-toggle">
      <label>
        <input type="checkbox" id="toggleBB">
        Bollinger Bands
      </label>
    </div>

    <div class="chart-box">
      <div id="chart"></div>
    </div>

    <div class="news">
      <h3>Latest News</h3>
      <ul id="news"></ul>
    </div>
  </div>

  <script>
    let chart;
    let bbUpperSeries = null;
    let bbLowerSeries = null;

    function setDefaultDates() {
      const today = new Date();
      const endDate = today.toISOString().split("T")[0];

      const start = new Date();
      start.setFullYear(start.getFullYear() - 2);
      const startDate = start.toISOString().split("T")[0];

      document.getElementById("start").value = startDate;
      document.getElementById("end").value = endDate;
    }

    async function load() {
      const t = document.getElementById("ticker").value.trim().toUpperCase();
      const s = document.getElementById("start").value;
      const e = document.getElementById("end").value;

      let url = `/api/stock?ticker=${encodeURIComponent(t)}`;
      if (s) url += `&start=${encodeURIComponent(s)}`;
      if (e) url += `&end=${encodeURIComponent(e)}`;

      const res = await fetch(url);
      const data = await res.json();

      if (data.error) {
        alert(data.error);
        return;
      }

      const changeEl = document.getElementById("changeCard");

      document.getElementById("tickerCard").innerText = data.ticker;
      document.getElementById("priceCard").innerText = `$${data.price}`;
      changeEl.innerText = `${data.change} (${data.change_pct}%)`;
      changeEl.className = "value " + (data.change >= 0 ? "positive" : "negative");

      const chartContainer = document.getElementById("chart");
      chartContainer.innerHTML = "";

      chart = LightweightCharts.createChart(chartContainer, {
        width: chartContainer.clientWidth,
        height: chartContainer.clientHeight,
        layout: {
          background: { color: "#ffffff" },
          textColor: "#111827"
        },
        grid: {
          vertLines: {
            color: "#e5e7eb"
          },
          horzLines: {
            color: "#e5e7eb"
          }
        },
        rightPriceScale: {
          borderColor: "#d1d5db"
        },
        timeScale: {
          borderColor: "#d1d5db"
        }
      });

      const candleSeries = chart.addCandlestickSeries();

      candleSeries.setData(
        data.prices.map(p => ({
          time: p.date,
          open: p.open,
          high: p.high,
          low: p.low,
          close: p.close
        }))
      );

      const ma20 = chart.addLineSeries({
        color: "rgba(37, 99, 235, 0.7)",
        lineWidth: 1,
        priceLineVisible: false,
        lastValueVisible: false
      });

      ma20.setData(
        data.prices
          .filter(p => p.ma20 !== null)
          .map(p => ({ time: p.date, value: p.ma20 }))
      );

      bbUpperSeries = chart.addLineSeries({
        color: "#7c3aed",
        lineWidth: 1,
        visible: false,
        priceLineVisible: false,
        lastValueVisible: false
      });

      bbUpperSeries.setData(
        data.prices
          .filter(p => p.bb_upper !== null)
          .map(p => ({ time: p.date, value: p.bb_upper }))
      );

      bbLowerSeries = chart.addLineSeries({
        color: "#7c3aed",
        lineWidth: 1,
        visible: false,
        priceLineVisible: false,
        lastValueVisible: false
      });

      bbLowerSeries.setData(
        data.prices
          .filter(p => p.bb_lower !== null)
          .map(p => ({ time: p.date, value: p.bb_lower }))
      );

      if (data.prices.length > 0) {
        const visibleFromIndex = Math.max(data.prices.length - 150, 0);
        const visibleToIndex = data.prices.length - 1;

        if (data.prices.length > 150) {
          chart.timeScale().setVisibleRange({
            from: data.prices[visibleFromIndex].date,
            to: data.prices[visibleToIndex].date
          });
        } else {
          chart.timeScale().fitContent();
        }
      }

      const showBB = document.getElementById("toggleBB").checked;

      bbUpperSeries.applyOptions({ visible: showBB });
      bbLowerSeries.applyOptions({ visible: showBB });

      const newsEl = document.getElementById("news");
      newsEl.innerHTML = "";

      data.news.forEach(n => {
        const li = document.createElement("li");
        li.innerHTML = `<a href="${n.link}" target="_blank" rel="noopener noreferrer">${n.title}</a>`;
        newsEl.appendChild(li);
      });

      chart.applyOptions({
        width: chartContainer.clientWidth,
        height: chartContainer.clientHeight
      });
    }

    document.getElementById("toggleBB").addEventListener("change", function () {
      const show = this.checked;

      if (bbUpperSeries && bbLowerSeries) {
        bbUpperSeries.applyOptions({ visible: show });
        bbLowerSeries.applyOptions({ visible: show });
      }
    });

    window.addEventListener("resize", () => {
      const chartContainer = document.getElementById("chart");

      if (chart) {
        chart.applyOptions({
          width: chartContainer.clientWidth,
          height: chartContainer.clientHeight
        });
      }
    });

    setDefaultDates();
    load();
  </script>
</body>
</html>
