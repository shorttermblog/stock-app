<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stock App</title>

  <script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 20px;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 25px;
      align-items: center;
    }

    input, button {
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    input {
      background: #1e293b;
      color: white;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .chart-box {
      background: #ffffff;
      padding: 20px;
      border-radius: 16px;
      height: 520px;
      margin-bottom: 30px;
    }

    #chart {
      width: 100%;
      height: 100%;
    }

    .cards {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
    }

    .positive { color: #22c55e; }
    .negative { color: #ef4444; }

    .news {
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
    }

    .news a {
      color: #93c5fd;
    }
  </style>
</head>

<body>
<div class="container">

  <h2>Stock Dashboard</h2>

  <div class="controls">
    <input id="ticker" value="AAPL">
    <input id="start" type="date">
    <input id="end" type="date">

    <label style="display:flex;align-items:center;gap:6px;">
      <input type="checkbox" id="showBollinger" onchange="load()">
      Bollinger Bands
    </label>

    <button onclick="load()">Load</button>
  </div>

  <div class="cards">
    <div class="card">Ticker: <span id="tickerCard"></span></div>
    <div class="card">Price: <span id="priceCard"></span></div>
    <div class="card">Change: <span id="changeCard"></span></div>
  </div>

  <div class="chart-box">
    <div id="chart"></div>
  </div>

  <div class="news">
    <h3>News</h3>
    <ul id="news"></ul>
  </div>

</div>

<script>
let chart;

async function load() {
  const t = document.getElementById("ticker").value;
  const s = document.getElementById("start").value;
  const e = document.getElementById("end").value;

  let url = `/api/stock?ticker=${t}`;
  if (s) url += `&start=${s}`;
  if (e) url += `&end=${e}`;

  const res = await fetch(url);
  const data = await res.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  document.getElementById("tickerCard").innerText = data.ticker;
  document.getElementById("priceCard").innerText = data.price;

  const changeEl = document.getElementById("changeCard");
  changeEl.innerText = `${data.change} (${data.change_pct}%)`;
  changeEl.className = data.change >= 0 ? "positive" : "negative";

  const chartContainer = document.getElementById("chart");
  chartContainer.innerHTML = "";

  chart = LightweightCharts.createChart(chartContainer, {
    width: chartContainer.clientWidth,
    height: chartContainer.clientHeight,
    layout: {
      background: { color: "#ffffff" },
      textColor: "#111827"
    }
  });

  const candleSeries = chart.addCandlestickSeries();
  candleSeries.setData(
    data.prices.map(p => ({
      time: p.date,
      open: p.open,
      high: p.high,
      low: p.low,
      close: p.close
    }))
  );

  // MA20 (always visible)
  const ma20 = chart.addLineSeries({
    color: "#2563eb",
    lineWidth: 2,
    priceLineVisible: false,
    lastValueVisible: false
  });

  ma20.setData(
    data.prices
      .filter(p => p.ma20 !== null)
      .map(p => ({ time: p.date, value: p.ma20 }))
  );

  // Optional Bollinger
  const showBollinger = document.getElementById("showBollinger").checked;

  if (showBollinger) {
    const bbUpper = chart.addLineSeries({
      color: "#7c3aed",
      lineWidth: 1,
      priceLineVisible: false,
      lastValueVisible: false
    });

    bbUpper.setData(
      data.prices
        .filter(p => p.bb_upper !== null)
        .map(p => ({ time: p.date, value: p.bb_upper }))
    );

    const bbLower = chart.addLineSeries({
      color: "#7c3aed",
      lineWidth: 1,
      priceLineVisible: false,
      lastValueVisible: false
    });

    bbLower.setData(
      data.prices
        .filter(p => p.bb_lower !== null)
        .map(p => ({ time: p.date, value: p.bb_lower }))
    );
  }

  chart.timeScale().fitContent();

  const newsEl = document.getElementById("news");
  newsEl.innerHTML = "";

  data.news.forEach(n => {
    const li = document.createElement("li");
    li.innerHTML = `<a href="${n.link}" target="_blank">${n.title}</a>`;
    newsEl.appendChild(li);
  });
}

load();
</script>

</body>
</html>
