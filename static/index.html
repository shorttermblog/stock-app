<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Asset App</title>

  <script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 32px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 120px;
      gap: 10px;
      margin-bottom: 25px;
    }

    input,
    button {
      width: 100%;
      padding: 13px 14px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
    }

    input {
      background: #1e293b;
      color: white;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      background: #475569;
      cursor: not-allowed;
    }

    .asset-search {
      position: relative;
      width: 100%;
    }

    .suggestions {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      z-index: 100;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 16px 35px rgba(0, 0, 0, 0.35);
      max-height: 340px;
      overflow-y: auto;
    }

    .suggestion-item {
      padding: 11px 12px;
      cursor: pointer;
      border-bottom: 1px solid #334155;
    }

    .suggestion-item:last-child {
      border-bottom: none;
    }

    .suggestion-item:hover,
    .suggestion-item.active {
      background: #334155;
    }

    .suggestion-main {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
      font-weight: bold;
    }

    .suggestion-name {
      color: #e5e7eb;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .suggestion-symbol {
      color: #93c5fd;
      white-space: nowrap;
    }

    .suggestion-meta {
      margin-top: 4px;
      font-size: 12px;
      color: #94a3b8;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 25px;
    }

    .card {
      background: #1e293b;
      padding: 18px;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
    }

    .label {
      color: #94a3b8;
      font-size: 13px;
    }

    .value {
      font-size: 24px;
      font-weight: bold;
      margin-top: 8px;
      word-break: break-word;
    }

    .subvalue {
      margin-top: 6px;
      font-size: 13px;
      color: #94a3b8;
      word-break: break-word;
    }

    .positive {
      color: #22c55e;
    }

    .negative {
      color: #ef4444;
    }

    .chart-toggle {
      margin-bottom: 10px;
      display: flex;
      justify-content: flex-end;
    }

    .chart-toggle label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
    }

    .chart-toggle input {
      width: auto;
    }

    .chart-box {
      background: #ffffff;
      padding: 12px;
      border-radius: 16px;
      height: 520px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
      margin-bottom: 30px;
      overflow: hidden;
      touch-action: pan-y;
    }

    #chart {
      width: 100%;
      height: 100%;
      touch-action: pan-y;
    }

    .news {
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
    }

    .news h3 {
      margin-top: 0;
      margin-bottom: 14px;
    }

    .summary-button {
      display: block;
      width: 100%;
      margin: 16px 0 20px 0;
      padding: 16px 18px;
      border-radius: 12px;
      border: 2px solid #93c5fd;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
    }

    .summary-button:hover {
      background: #1d4ed8;
    }

    .summary-button:disabled {
      background: #475569;
      border-color: #64748b;
      color: #cbd5e1;
      cursor: not-allowed;
    }

    .news-summary {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .news-summary-title {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: bold;
    }

    .news-summary-text {
      color: #e5e7eb;
      font-size: 15px;
      margin: 0;
    }

    .summary-row {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 8px;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .summary-row:last-child {
      margin-bottom: 0;
    }

    .summary-bullet {
      color: #93c5fd;
      font-weight: bold;
    }

    .summary-content {
      color: #e5e7eb;
    }

    .news ul {
      padding-left: 20px;
    }

    .news li {
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .news a {
      color: #93c5fd;
      text-decoration: none;
    }

    .news a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .container {
        margin: 0;
        padding: 16px;
      }

      h1 {
        font-size: 26px;
        margin-bottom: 18px;
      }

      .controls {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      input,
      button {
        font-size: 16px;
        padding: 14px;
      }

      .cards {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .card {
        padding: 16px;
      }

      .value {
        font-size: 22px;
      }

      .chart-toggle {
        justify-content: flex-start;
        margin-bottom: 12px;
      }

      .chart-box {
        height: 360px;
        padding: 8px;
        border-radius: 14px;
      }

      .news {
        padding: 16px;
      }

      .news-summary {
        padding: 14px;
      }
    }

    @media (max-width: 768px) and (orientation: landscape) {
      .chart-box {
        height: 240px;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 12px;
      }

      h1 {
        font-size: 24px;
      }

      .chart-box {
        height: 320px;
      }

      .value {
        font-size: 20px;
      }

      .news ul {
        padding-left: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Asset Dashboard</h1>

    <form class="controls" id="assetForm">
      <div class="asset-search">
        <input id="ticker" value="AAPL" placeholder="Asset" autocomplete="off">
        <div id="suggestions" class="suggestions"></div>
      </div>

      <input id="start" type="date">
      <input id="end" type="date">
      <button type="submit">Load</button>
    </form>

    <div class="cards">
      <div class="card">
        <div class="label">Asset</div>
        <div class="value" id="tickerCard">-</div>
        <div class="subvalue" id="symbolCard"></div>
      </div>

      <div class="card">
        <div class="label">Last Price</div>
        <div class="value" id="priceCard">-</div>
      </div>

      <div class="card">
        <div class="label">Daily Change</div>
        <div class="value" id="changeCard">-</div>
      </div>
    </div>

    <div class="chart-toggle">
      <label>
        <input type="checkbox" id="toggleBB">
        Bollinger Bands
      </label>
    </div>

    <div class="chart-box">
      <div id="chart"></div>
    </div>

    <div class="news">
      <h3>Latest News</h3>

      <button id="summaryButton" class="summary-button" type="button" disabled>
        Generate AI News Summary
      </button>

      <div class="news-summary" id="newsSummaryBox" style="display: none;">
        <div class="news-summary-title">AI News Summary</div>
        <div class="news-summary-text" id="newsSummary"></div>
      </div>

      <ul id="news"></ul>
    </div>
  </div>

  <script>
    let chart;
    let bbUpperSeries = null;
    let bbLowerSeries = null;

    let suggestions = [];
    let activeSuggestionIndex = -1;
    let searchTimeout = null;

    let currentAsset = null;
    let cachedSummaryKey = "";
    let cachedSummaryText = "";

    const tickerInput = document.getElementById("ticker");
    const suggestionsEl = document.getElementById("suggestions");
    const summaryButton = document.getElementById("summaryButton");
    const newsSummaryBox = document.getElementById("newsSummaryBox");
    const newsSummaryEl = document.getElementById("newsSummary");

    function setDefaultDates() {
      const today = new Date();
      const endDate = today.toISOString().split("T")[0];

      const start = new Date();
      start.setFullYear(start.getFullYear() - 2);
      const startDate = start.toISOString().split("T")[0];

      document.getElementById("start").value = startDate;
      document.getElementById("end").value = endDate;
    }

    function formatNumber(value) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) {
        return "-";
      }

      return Number(value).toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function makeSummaryKey(asset) {
      if (!asset || !asset.news) {
        return "";
      }

      const newsTitles = asset.news.map(item => item.title || "").join("|");

      return `${asset.ticker}|${asset.asset_name}|${asset.quote_type}|${newsTitles}`;
    }

    function renderSummary(summary) {
      newsSummaryEl.innerHTML = "";

      if (!summary) {
        showSummaryMessage("Summary unavailable.");
        return;
      }

      const lines = summary
        .split("\n")
        .map(line => line.trim())
        .filter(line => line.length > 0)
        .map(line => line.replace(/^[-•]\s*/, ""));

      if (lines.length === 0) {
        showSummaryMessage("Summary unavailable.");
        return;
      }

      lines.forEach(line => {
        const row = document.createElement("div");
        row.className = "summary-row";

        const bullet = document.createElement("div");
        bullet.className = "summary-bullet";
        bullet.innerText = "•";

        const content = document.createElement("div");
        content.className = "summary-content";
        content.innerText = line;

        row.appendChild(bullet);
        row.appendChild(content);

        newsSummaryEl.appendChild(row);
      });
    }

    function showSummaryMessage(message) {
      newsSummaryEl.innerHTML = "";

      const row = document.createElement("div");
      row.className = "summary-row";

      const bullet = document.createElement("div");
      bullet.className = "summary-bullet";
      bullet.innerText = "•";

      const content = document.createElement("div");
      content.className = "summary-content";
      content.innerText = message;

      row.appendChild(bullet);
      row.appendChild(content);

      newsSummaryEl.appendChild(row);
    }

    function resetSummaryState() {
      newsSummaryBox.style.display = "none";
      newsSummaryEl.innerHTML = "";
      summaryButton.disabled = true;
      summaryButton.innerText = "Generate AI News Summary";
      cachedSummaryKey = "";
      cachedSummaryText = "";
    }

    function hideSuggestions() {
      suggestionsEl.style.display = "none";
      suggestionsEl.innerHTML = "";
      activeSuggestionIndex = -1;
    }

    function showSuggestions(items) {
      suggestions = items || [];
      activeSuggestionIndex = -1;

      suggestionsEl.innerHTML = "";

      if (suggestions.length === 0) {
        hideSuggestions();
        return;
      }

      suggestions.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "suggestion-item";
        div.dataset.index = index;

        const exchangeText = item.exchange_name || item.exchange || "";
        const typeText = item.type_display || item.quote_type || "";

        div.innerHTML = `
          <div class="suggestion-main">
            <span class="suggestion-name">${item.name}</span>
            <span class="suggestion-symbol">${item.symbol}</span>
          </div>
          <div class="suggestion-meta">${typeText}${exchangeText ? " · " + exchangeText : ""}</div>
        `;

        div.addEventListener("mousedown", function (event) {
          event.preventDefault();
          chooseSuggestion(index);
        });

        suggestionsEl.appendChild(div);
      });

      suggestionsEl.style.display = "block";
    }

    function updateActiveSuggestion() {
      const items = suggestionsEl.querySelectorAll(".suggestion-item");

      items.forEach((item, index) => {
        item.classList.toggle("active", index === activeSuggestionIndex);
      });
    }

    function chooseSuggestion(index) {
      const item = suggestions[index];

      if (!item) {
        return;
      }

      tickerInput.value = item.symbol;
      tickerInput.dataset.symbol = item.symbol;
      tickerInput.dataset.name = item.name || item.symbol;
      tickerInput.dataset.quoteType = item.quote_type || "";

      hideSuggestions();
      load();
    }

    async function fetchSuggestions(query) {
      if (!query || query.length < 2) {
        hideSuggestions();
        return;
      }

      try {
        const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
        const data = await response.json();

        showSuggestions(data.results || []);
      } catch (error) {
        hideSuggestions();
      }
    }

    async function generateNewsSummary() {
      if (!currentAsset || !currentAsset.news || currentAsset.news.length === 0) {
        newsSummaryBox.style.display = "block";
        showSummaryMessage("No news available to summarize.");
        return;
      }

      const summaryKey = makeSummaryKey(currentAsset);

      if (cachedSummaryKey === summaryKey && cachedSummaryText) {
        newsSummaryBox.style.display = "block";
        renderSummary(cachedSummaryText);
        return;
      }

      summaryButton.disabled = true;
      summaryButton.innerText = "Generating Summary...";

      newsSummaryBox.style.display = "block";
      showSummaryMessage("Generating news summary...");

      try {
        const response = await fetch("/api/news-summary", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            ticker: currentAsset.ticker,
            asset_name: currentAsset.asset_name,
            quote_type: currentAsset.quote_type,
            news: currentAsset.news
          })
        });

        const result = await response.json();

        const summary = result.news_summary || "Summary unavailable.";

        cachedSummaryKey = summaryKey;
        cachedSummaryText = summary;

        renderSummary(summary);
      } catch (error) {
        showSummaryMessage("News summary unavailable right now.");
      } finally {
        summaryButton.disabled = false;
        summaryButton.innerText = "Generate AI News Summary";
      }
    }

    async function load() {
      const inputValue = tickerInput.value.trim();
      const selectedSymbol = tickerInput.dataset.symbol || "";
      const t = selectedSymbol || inputValue || "AAPL";

      const s = document.getElementById("start").value;
      const e = document.getElementById("end").value;

      hideSuggestions();
      resetSummaryState();
      currentAsset = null;

      let url = `/api/stock?ticker=${encodeURIComponent(t)}`;
      if (s) url += `&start=${encodeURIComponent(s)}`;
      if (e) url += `&end=${encodeURIComponent(e)}`;

      const res = await fetch(url);
      const data = await res.json();

      if (data.error) {
        alert(data.error);
        return;
      }

      currentAsset = data;

      tickerInput.value = data.ticker || "AAPL";
      tickerInput.dataset.symbol = data.ticker || "AAPL";
      tickerInput.dataset.name = data.asset_name || data.company_name || data.ticker || "AAPL";
      tickerInput.dataset.quoteType = data.quote_type || "";

      const changeEl = document.getElementById("changeCard");

      const assetDisplayName =
        data.asset_name ||
        data.company_name ||
        data.ticker ||
        data.query ||
        "-";

      document.getElementById("tickerCard").innerText = assetDisplayName;
      document.getElementById("symbolCard").innerText = data.ticker ? data.ticker : "";

      document.getElementById("priceCard").innerText = formatNumber(data.price);

      changeEl.innerText = `${formatNumber(data.change)} (${formatNumber(data.change_pct)}%)`;
      changeEl.className = "value " + (data.change >= 0 ? "positive" : "negative");

      const chartContainer = document.getElementById("chart");
      chartContainer.innerHTML = "";

      chart = LightweightCharts.createChart(chartContainer, {
        width: chartContainer.clientWidth,
        height: chartContainer.clientHeight,

        layout: {
          background: {
            color: "#ffffff"
          },
          textColor: "#111827"
        },

        grid: {
          vertLines: {
            color: "#e5e7eb"
          },
          horzLines: {
            color: "#e5e7eb"
          }
        },

        rightPriceScale: {
          autoScale: true,
          borderColor: "#d1d5db"
        },

        timeScale: {
          borderColor: "#d1d5db"
        },

        handleScroll: {
          mouseWheel: true,
          pressedMouseMove: true,
          horzTouchDrag: true,
          vertTouchDrag: false
        },

        handleScale: {
          axisPressedMouseMove: false,
          mouseWheel: true,
          pinch: true
        }
      });

      const candleSeries = chart.addCandlestickSeries();

      candleSeries.setData(
        data.prices.map(p => ({
          time: p.date,
          open: p.open,
          high: p.high,
          low: p.low,
          close: p.close
        }))
      );

      const ma20 = chart.addLineSeries({
        color: "rgba(37, 99, 235, 0.7)",
        lineWidth: 1,
        priceLineVisible: false,
        lastValueVisible: false
      });

      ma20.setData(
        data.prices
          .filter(p => p.ma20 !== null)
          .map(p => ({ time: p.date, value: p.ma20 }))
      );

      bbUpperSeries = chart.addLineSeries({
        color: "#7c3aed",
        lineWidth: 1,
        visible: false,
        priceLineVisible: false,
        lastValueVisible: false
      });

      bbUpperSeries.setData(
        data.prices
          .filter(p => p.bb_upper !== null)
          .map(p => ({ time: p.date, value: p.bb_upper }))
      );

      bbLowerSeries = chart.addLineSeries({
        color: "#7c3aed",
        lineWidth: 1,
        visible: false,
        priceLineVisible: false,
        lastValueVisible: false
      });

      bbLowerSeries.setData(
        data.prices
          .filter(p => p.bb_lower !== null)
          .map(p => ({ time: p.date, value: p.bb_lower }))
      );

      candleSeries.priceScale().applyOptions({
        autoScale: true
      });

      if (data.prices.length > 0) {
        const visibleFromIndex = Math.max(data.prices.length - 150, 0);
        const visibleToIndex = data.prices.length - 1;

        if (data.prices.length > 150) {
          chart.timeScale().setVisibleRange({
            from: data.prices[visibleFromIndex].date,
            to: data.prices[visibleToIndex].date
          });
        } else {
          chart.timeScale().fitContent();
        }
      }

      const showBB = document.getElementById("toggleBB").checked;

      bbUpperSeries.applyOptions({
        visible: showBB
      });

      bbLowerSeries.applyOptions({
        visible: showBB
      });

      const newsEl = document.getElementById("news");
      newsEl.innerHTML = "";

      if (!data.news || data.news.length === 0) {
        const li = document.createElement("li");
        li.innerText = "No recent news found.";
        newsEl.appendChild(li);

        summaryButton.disabled = true;
        summaryButton.innerText = "No News to Summarize";
      } else {
        data.news.forEach(n => {
          const li = document.createElement("li");
          li.innerHTML = `<a href="${n.link}" target="_blank" rel="noopener noreferrer">${n.title}</a>`;
          newsEl.appendChild(li);
        });

        summaryButton.disabled = false;
        summaryButton.innerText = "Generate AI News Summary";
      }

      chart.applyOptions({
        width: chartContainer.clientWidth,
        height: chartContainer.clientHeight
      });
    }

    tickerInput.addEventListener("input", function () {
      const query = tickerInput.value.trim();

      tickerInput.dataset.symbol = "";
      tickerInput.dataset.name = "";
      tickerInput.dataset.quoteType = "";

      clearTimeout(searchTimeout);

      searchTimeout = setTimeout(() => {
        fetchSuggestions(query);
      }, 250);
    });

    tickerInput.addEventListener("keydown", function (event) {
      if (suggestionsEl.style.display !== "block") {
        return;
      }

      if (event.key === "ArrowDown") {
        event.preventDefault();

        activeSuggestionIndex =
          activeSuggestionIndex < suggestions.length - 1
            ? activeSuggestionIndex + 1
            : 0;

        updateActiveSuggestion();
      }

      if (event.key === "ArrowUp") {
        event.preventDefault();

        activeSuggestionIndex =
          activeSuggestionIndex > 0
            ? activeSuggestionIndex - 1
            : suggestions.length - 1;

        updateActiveSuggestion();
      }

      if (event.key === "Enter") {
        if (activeSuggestionIndex >= 0) {
          event.preventDefault();
          chooseSuggestion(activeSuggestionIndex);
        }
      }

      if (event.key === "Escape") {
        hideSuggestions();
      }
    });

    tickerInput.addEventListener("blur", function () {
      setTimeout(() => {
        hideSuggestions();
      }, 150);
    });

    document.getElementById("assetForm").addEventListener("submit", function (event) {
      event.preventDefault();
      load();
    });

    document.getElementById("toggleBB").addEventListener("change", function () {
      if (!bbUpperSeries || !bbLowerSeries) {
        return;
      }

      const visible = this.checked;

      bbUpperSeries.applyOptions({
        visible: visible
      });

      bbLowerSeries.applyOptions({
        visible: visible
      });
    });

    summaryButton.addEventListener("click", function () {
      generateNewsSummary();
    });

    window.addEventListener("resize", function () {
      if (!chart) {
        return;
      }

      const chartContainer = document.getElementById("chart");

      chart.applyOptions({
        width: chartContainer.clientWidth,
        height: chartContainer.clientHeight
      });
    });

    setDefaultDates();

    tickerInput.value = "AAPL";
    tickerInput.dataset.symbol = "AAPL";

    load();
  </script>
</body>
</html>
